<div class="group h-full flex flex-col bg-[var(--white-cards)] rounded-[8px] border-[1.5px] border-[var(--border-light)] transition-all duration-300 hover:-translate-y-1 hover:border-[var(--primary-green)] hover:shadow-[4px_4px_0_var(--primary-green)] overflow-hidden relative">

    <div class="h-[168px] w-full relative overflow-hidden bg-[var(--bg-creme)]">
        @if(image_url) {
            <img [src]="getImageUrl(image_url)" [alt]="titre" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-[1.04]" loading="lazy">
        } @else {
            <img src="/imageDefaut/imageDefaut.png" [alt]="titre" class="w-full h-full object-cover opacity-80 transition-transform duration-500 group-hover:scale-[1.04]">
        }

        @if(canManage) {
            <div class="absolute top-3 right-3 flex gap-2 z-10">
                <button (click)="onEdit($event)" class="w-8 h-8 bg-white/90 backdrop-blur-sm flex items-center justify-center rounded border border-[var(--border-light)] text-[var(--primary-green)] hover:bg-[var(--primary-green)] hover:text-white transition-colors shadow-sm" title="Modifier">
                    <i class="fa-regular fa-pen-to-square"></i>
                </button>
                <button (click)="onDelete($event)" class="w-8 h-8 bg-white/90 backdrop-blur-sm flex items-center justify-center rounded border border-[var(--border-light)] text-[var(--accent-orange)] hover:bg-[var(--accent-orange)] hover:text-white transition-colors shadow-sm" title="Supprimer">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
            </div>
        }
    </div>

    <div class="p-5 flex flex-col flex-grow bg-[var(--white-cards)]">
        
        <div class="font-josefin text-[11px] uppercase text-[var(--accent-orange)] tracking-widest mb-3 flex items-center flex-wrap gap-x-3 gap-y-2">
            <span class="flex items-center gap-1.5"><i class="fa-regular fa-calendar"></i> {{ date_evenement | date:'d MMMM yyyy' }}</span>
            <span class="text-[var(--border-light)]">|</span>
            <span class="flex items-center gap-1.5"><i class="fa-regular fa-clock"></i> {{ heure_debut }} - {{ heure_fin }}</span>
        </div>

        <h3 class="font-abril text-lg leading-tight text-[var(--primary-green)] mb-2 line-clamp-2" [title]="titre">
            {{ titre }}
        </h3>
        
        <div class="font-josefin text-[11px] text-[var(--text-secondary)] uppercase tracking-wider mb-3 flex items-center gap-1.5">
            <i class="fa-solid fa-location-dot"></i> <span class="line-clamp-1">{{ lieu }}</span>
        </div>

        <p class="font-dm text-[13px] text-[var(--text-secondary)] line-clamp-2 mb-5 flex-grow leading-relaxed">
            {{ description }}
        </p>

        <div class="mt-auto pt-4 border-t border-[var(--border-light)] flex gap-3">
            <button [routerLink]="['/evenements', id_evenement]" class="flex-1 btn-secondary !py-2.5 text-center text-xs tracking-wide">
                Voir la fiche
            </button>
            
            @if (id_formulaire && isInscriptionOuverte) {
                <button [routerLink]="['/evenements', id_evenement]" [queryParams]="{ openForm: 'true' }" class="flex-1 btn-primary !py-2.5 text-center text-xs tracking-wide">
                    S'inscrire
                </button>
            }
        </div>
    </div>

    @if (showDeleteModal) {
       }
</div>
